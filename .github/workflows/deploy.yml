name: Deploy (Cloudflare)

# Deploys run where Cloudflare is reachable (GitHub-hosted runners), not from the
# Claude Code session. See docs/runbook.md → "Cloudflare deploy".
#
# Auto-deploys main — but only after CI has gone green on that exact commit.
# Triggering on `push` directly would ship code whose tests never ran (or failed),
# and the first thing a deploy does is migrate the production database. Chaining
# off CI reuses its verification (lint, typecheck, migrations against a real
# Postgres, full test suite) instead of duplicating it here.
#
# workflow_dispatch stays for forced deploys — re-running migrations, or shipping
# without waiting on CI.
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    # A CI run that failed or was cancelled must not deploy. Skipping here also
    # skips deploy-web/deploy-api, which depend on this job.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run checks out the default branch by default, which is not
          # necessarily the commit CI just verified. Pin to that exact sha so we
          # deploy what was tested.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Apply migrations to Neon
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm db:migrate

  deploy-web:
    needs: migrate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
        with:
          # Same pinned sha as the migrate job — all three must build the one
          # commit CI verified, not whatever main points at now.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - run: pnpm --filter @routewrangler/contracts build
        working-directory: .
      - name: Build (OpenNext) + deploy to Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          pnpm exec opennextjs-cloudflare build
          pnpm exec wrangler deploy

  deploy-api:
    needs: migrate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
        with:
          # Same pinned sha as the migrate job — all three must build the one
          # commit CI verified, not whatever main points at now.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - name: Deploy API container to Cloudflare
        # wrangler builds + pushes the image (root Dockerfile) and deploys the
        # container Worker per apps/api/wrangler.jsonc. Runtime secrets
        # (DATABASE_URL, S3/R2, Clerk) are set once via `wrangler secret put`.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy
