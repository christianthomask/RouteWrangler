services:
  postgres:
    image: postgres:16-alpine
    container_name: routewrangler-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: routewrangler
      POSTGRES_PASSWORD: routewrangler
      POSTGRES_DB: routewrangler
    ports:
      - "5432:5432"
    volumes:
      - routewrangler-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U routewrangler -d routewrangler"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Local S3-compatible object storage (ADR-015). The same S3 adapter that talks
  # to AWS S3 in prod talks to MinIO locally — identical presign flow, no code
  # change. Console at http://localhost:9001 (minioadmin / minioadmin).
  minio:
    image: minio/minio:latest
    container_name: routewrangler-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - routewrangler-miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the photos bucket then exit.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/routewrangler-photos &&
      echo 'bucket ready';
      "

volumes:
  routewrangler-pgdata:
  routewrangler-miniodata:
